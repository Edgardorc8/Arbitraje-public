<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitraje Pro - Profit Calc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070a; font-family: 'Inter', sans-serif; }
        .glass-card { background: #0f172a; border: 1px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        input { background: #1e293b !important; border: 1px solid #334155 !important; color: #f8fafc !important; font-weight: 700; text-align: center; }
        input:focus { border-color: #3b82f6 !important; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .label-text { font-size: 0.65rem; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
    </style>
</head>
<body class="p-4 text-slate-200 flex flex-col items-center">

    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-8 mt-4">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-black tracking-tighter text-white">PROFIT <span class="text-blue-500">CALCULATOR</span></h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Arbitraje Vzla Edition</p>
        </header>

        <div class="space-y-6">
            <div class="bg-blue-500/5 p-5 rounded-3xl border border-blue-500/20">
                <label class="label-text text-blue-400 text-center">Monto Comprado en Subasta (Saldo Tarjeta)</label>
                <div class="flex items-center justify-center">
                    <span class="text-2xl font-bold mr-2 text-blue-400">$</span>
                    <input type="number" id="saldo" value="465.62" oninput="calc()" class="text-3xl w-full p-2 rounded-2xl">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text">Comisión Banco %</label>
                    <input type="number" id="comB" value="4.45" oninput="calc()" step="0.01" class="w-full p-3 rounded-xl">
                </div>
                <div>
                    <label class="label-text">Comisión Fondeo %</label>
                    <input type="number" id="comF" value="2.5" oninput="calc()" step="0.1" class="w-full p-3 rounded-xl">
                </div>
            </div>

            <div class="bg-slate-900/50 p-5 rounded-3xl border border-dashed border-slate-700 text-center">
                <p class="label-text">Monto Neto a pasar (BPay/Binance)</p>
                <p id="montoNeto" class="text-4xl font-black text-white">$0.00</p>
                <p id="comUsd" class="text-[10px] text-red-500 font-bold mt-1"></p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text">Tasa Subasta (Bs)</label>
                    <input type="number" id="tasaS" value="38.50" oninput="calc()" class="w-full p-3 rounded-xl">
                </div>
                <div>
                    <label class="label-text">Tasa Venta (Bs)</label>
                    <input type="number" id="tasaV" value="44.80" oninput="calc()" class="w-full p-3 rounded-xl border-emerald-500/20">
                </div>
            </div>

            <div id="resBox" class="bg-emerald-500/10 p-6 rounded-[2rem] border border-emerald-500/20 text-center shadow-inner">
                <p class="label-text text-emerald-500">Profit Neto del Ciclo</p>
                <p id="profitBs" class="text-4xl font-black text-emerald-500">0.00 Bs</p>
                <p id="profitUsd" class="text-sm font-bold text-slate-400 mt-1">$0.00</p>
                
                <div class="mt-6 pt-4 border-t border-emerald-500/10 flex justify-between items-center text-[10px] font-bold text-slate-500 uppercase">
                    <div>
                        <p>ROI: <span id="roi" class="text-emerald-400">0%</span></p>
                    </div>
                    <div>
                        <p>USDT: <span id="usdt" class="text-emerald-400">0.00</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calc() {
            const saldo = parseFloat(document.getElementById('saldo').value) || 0;
            const comB = parseFloat(document.getElementById('comB').value) || 0;
            const comF = parseFloat(document.getElementById('comF').value) || 0;
            const tasaS = parseFloat(document.getElementById('tasaS').value) || 0;
            const tasaV = parseFloat(document.getElementById('tasaV').value) || 0;

            // 1. Calcular cuánto pasar (Monto Neto para la tarjeta)
            const montoNeto = saldo / (1 + (comB / 100));
            const comisionUsd = saldo - montoNeto;

            // 2. USDT que quedan después de la comisión de fondeo
            const usdtRecibidos = montoNeto * (1 - (comF / 100));

            // 3. Profit
            const costoInversionBs = saldo * tasaS;
            const retornoBs = usdtRecibidos * tasaV;
            const profitBs = retornoBs - costoInversionBs;
            const profitUsd = profitBs / tasaV;
            const roi = (profitBs / costoInversionBs) * 100;

            // UI
            document.getElementById('montoNeto').innerText = "$" + montoNeto.toFixed(2);
            document.getElementById('comUsd').innerText = "Comisión Banco: -$" + comisionUsd.toFixed(2);
            document.getElementById('profitBs').innerText = (profitBs >= 0 ? "+" : "") + profitBs.toLocaleString('es-VE', {minimumFractionDigits: 2}) + " Bs";
            document.getElementById('profitUsd').innerText = "Equivalente a $" + profitUsd.toFixed(2);
            document.getElementById('roi').innerText = roi.toFixed(2) + "%";
            document.getElementById('usdt').innerText = usdtRecibidos.toFixed(2);
        }

        window.onload = calc;
    </script>
</body>
</html>
